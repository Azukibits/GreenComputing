name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --target GreenComputing GreenComputingCLI

      - name: Package
        run: |
          mkdir -p package/GreenComputing-macos
          cp -R build/GreenComputing.app package/GreenComputing-macos/
          cp build/GreenComputingCLI package/GreenComputing-macos/
          cp README.md README.zh-CN.md LICENSE demo.cpp img1.png package/GreenComputing-macos/
          tar -czf GreenComputing-macos.tar.gz -C package GreenComputing-macos

      - uses: actions/upload-artifact@v4
        with:
          name: GreenComputing-macos
          path: GreenComputing-macos.tar.gz

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --target GreenComputingCLI

      - name: Package
        run: |
          mkdir -p package/GreenComputing-linux
          cp build/GreenComputingCLI package/GreenComputing-linux/
          cp README.md README.zh-CN.md LICENSE demo.cpp img1.png package/GreenComputing-linux/
          tar -czf GreenComputing-linux.tar.gz -C package GreenComputing-linux

      - uses: actions/upload-artifact@v4
        with:
          name: GreenComputing-linux
          path: GreenComputing-linux.tar.gz

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        shell: pwsh
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release --target GreenComputingCLI

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package/GreenComputing-windows | Out-Null
          Copy-Item build/Release/GreenComputingCLI.exe package/GreenComputing-windows/
          Copy-Item README.md,README.zh-CN.md,LICENSE,demo.cpp,img1.png package/GreenComputing-windows/
          Compress-Archive -Path package/GreenComputing-windows -DestinationPath GreenComputing-windows.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: GreenComputing-windows
          path: GreenComputing-windows.zip

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-linux
      - build-windows
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          cat > release-notes.md <<EOF
          GreenComputing ${TAG}

          Packages:
          - GreenComputing-macos.tar.gz: macOS GUI app and CLI
          - GreenComputing-linux.tar.gz: Linux CLI
          - GreenComputing-windows.zip: Windows CLI
          EOF

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release-assets/* --clobber
          else
            gh release create "$TAG" release-assets/* --title "$TAG" --notes-file release-notes.md
          fi
