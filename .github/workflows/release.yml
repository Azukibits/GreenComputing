name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --target GreenComputing GreenComputingCLI

      - name: Package
        run: |
          mkdir -p package/GreenComputing-macos
          cp -R build/GreenComputing.app package/GreenComputing-macos/
          cp build/GreenComputingCLI package/GreenComputing-macos/
          cp README.md README.zh-CN.md LICENSE demo.cpp img1.png package/GreenComputing-macos/
          hdiutil create -volname GreenComputing -srcfolder package/GreenComputing-macos -ov -format UDZO GreenComputing-macos.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: GreenComputing-macos
          path: GreenComputing-macos.dmg

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev qt6-base-dev-tools libgl1 libxcb-cursor0

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --target GreenComputing GreenComputingCLI

      - name: Package
        run: |
          mkdir -p package/GreenComputing-linux
          mkdir -p package/GreenComputing-linux/lib package/GreenComputing-linux/platforms
          cp build/GreenComputing package/GreenComputing-linux/
          cp build/GreenComputingCLI package/GreenComputing-linux/
          ldd build/GreenComputing | awk '/=> \// {print $3}' | xargs -I{} cp -n {} package/GreenComputing-linux/lib/ || true
          cp -R /usr/lib/x86_64-linux-gnu/qt6/plugins/platforms/* package/GreenComputing-linux/platforms/
          cat > package/GreenComputing-linux/run-greencomputing.sh <<'EOF'
          #!/usr/bin/env bash
          DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          export LD_LIBRARY_PATH="$DIR/lib:${LD_LIBRARY_PATH:-}"
          export QT_QPA_PLATFORM_PLUGIN_PATH="$DIR/platforms"
          exec "$DIR/GreenComputing" "$@"
          EOF
          chmod +x package/GreenComputing-linux/run-greencomputing.sh
          cp README.md README.zh-CN.md LICENSE demo.cpp img1.png package/GreenComputing-linux/
          tar -czf GreenComputing-linux.tar.gz -C package GreenComputing-linux

      - uses: actions/upload-artifact@v4
        with:
          name: GreenComputing-linux
          path: GreenComputing-linux.tar.gz

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.3"
          arch: "win64_msvc2019_64"

      - name: Configure
        shell: pwsh
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release --target GreenComputing GreenComputingCLI

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package/GreenComputing-windows | Out-Null
          Copy-Item build/Release/GreenComputing.exe package/GreenComputing-windows/
          Copy-Item build/Release/GreenComputingCLI.exe package/GreenComputing-windows/
          windeployqt package/GreenComputing-windows/GreenComputing.exe
          Copy-Item README.md,README.zh-CN.md,LICENSE,demo.cpp,img1.png package/GreenComputing-windows/
          Compress-Archive -Path package/GreenComputing-windows -DestinationPath GreenComputing-windows.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: GreenComputing-windows
          path: GreenComputing-windows.zip

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-linux
      - build-windows
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          cat > release-notes.md <<EOF
          GreenComputing ${TAG}

          Packages:
          - GreenComputing-macos.dmg: macOS GUI app and CLI
          - GreenComputing-linux.tar.gz: Linux GUI app and CLI
          - GreenComputing-windows.zip: Windows GUI app and CLI
          EOF

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release-assets/* --clobber
          else
            gh release create "$TAG" release-assets/* --title "$TAG" --notes-file release-notes.md
          fi
